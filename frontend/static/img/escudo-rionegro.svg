<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" width="280" height="320">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFED80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8920A;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Shield shape - escudo form -->
  <path d="M140 8 L260 8 L260 200 Q260 280 140 308 Q20 280 20 200 L20 8 Z"
        fill="url(#goldGrad)" stroke="#8B6914" stroke-width="3" filter="url(#shadow)"/>
  <!-- Inner shield border -->
  <path d="M140 18 L248 18 L248 198 Q248 268 140 294 Q32 268 32 198 L32 18 Z"
        fill="none" stroke="#B8860B" stroke-width="2"/>
  <!-- RIONEGRO top arc text - simplified as text along top -->
  <text x="140" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#5C3A00" letter-spacing="4">RIONEGRO</text>
  <!-- CIUDAD text - left side -->
  <text x="42" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3A00" 
        transform="rotate(-90, 42, 165)" letter-spacing="3">CIUDAD</text>
  <!-- DE ARMA text - right side -->
  <text x="238" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3A00"
        transform="rotate(90, 238, 155)" letter-spacing="2">DE ARMA</text>
  <!-- SANTIAGO bottom arc text -->
  <text x="140" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3A00" letter-spacing="3">SANTIAGO</text>
  <!-- Central coat of arms area - quadrant shield -->
  <rect x="80" y="55" width="120" height="140" rx="4" fill="white" stroke="#8B6914" stroke-width="1.5"/>
  <!-- Quadrant dividers -->
  <line x1="140" y1="55" x2="140" y2="195" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="80" y1="125" x2="200" y2="125" stroke="#8B6914" stroke-width="1.5"/>
  <!-- Top-left quadrant: Blue with castle (Castilla) -->
  <rect x="80" y="55" width="60" height="70" fill="#C8102E"/>
  <!-- castle simplified -->
  <rect x="98" y="80" width="24" height="30" fill="#F5D000"/>
  <rect x="95" y="75" width="8" height="12" fill="#F5D000"/>
  <rect x="110" y="75" width="8" height="12" fill="#F5D000"/>
  <!-- Top-right quadrant: Gold/Yellow with lion (Leon) -->
  <rect x="140" y="55" width="60" height="70" fill="#F5D000"/>
  <!-- lion simplified -->
  <text x="170" y="110" text-anchor="middle" font-family="serif" font-size="36" fill="#8B0000">&#x1F981;</text>
  <!-- Bottom-left quadrant: -->
  <rect x="80" y="125" width="60" height="70" fill="#006400"/>
  <!-- Chains of Navarra -->
  <line x1="90" y1="135" x2="130" y2="190" stroke="#FFD700" stroke-width="3"/>
  <line x1="130" y1="135" x2="90" y2="190" stroke="#FFD700" stroke-width="3"/>
  <line x1="90" y1="162" x2="130" y2="162" stroke="#FFD700" stroke-width="3"/>
  <!-- Bottom-right quadrant: -->
  <rect x="140" y="125" width="60" height="70" fill="#C8102E"/>
  <text x="170" y="175" text-anchor="middle" font-family="serif" font-size="28" fill="#FFD700">&#9997;</text>
</svg>